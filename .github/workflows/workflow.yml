name: Go CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  test:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        go-version: [1.21, 1.22]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go-version }}

      - name: Cache modules
        uses: actions/cache@v4
        with:
          path: |
            ~/go/pkg/mod
            ~/.cache/go-build
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}

      - name: Download dependencies
        run: go mod download

      - name: Run tests
        run: go test -v ./...

  build-and-push:
    needs: test
    uses: pmquy/phase5-task1/.github/workflows/reusable-build.yml
    with:
      image-name: lokikurri/phase5-task1
      registry: docker.io
      username: lokikurri
    secrets:
      REGISTRY_TOKEN: ${{ secrets.REGISTRY_TOKEN }}
